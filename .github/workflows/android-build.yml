name: Build VLTV+

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Baixa e configura o Gradle 9.3.1 diretamente via Action
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 9.3.1

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # Comando 'gradle build' usa o binário baixado pela Action acima
    - name: Build project
      run: gradle build

    # Gera o APK para download usando o binário global
    - name: Build Debug APK
      run: gradle assembleDebug

    # Disponibiliza o APK final na aba Actions
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VLTV-Plus-Debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Run tests
      run: gradle test
