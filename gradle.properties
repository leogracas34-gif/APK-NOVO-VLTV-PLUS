# Ativa o suporte às bibliotecas modernas do Android (Media3, Room, Leanback, etc.)
android.useAndroidX=true

# Converte automaticamente bibliotecas de terceiros antigas para o padrão AndroidX
android.enableJetifier=true

# Configuração de memória para o Gradle (evita erro de falta de memória no GitHub Actions)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Melhora a velocidade de compilação ativando o cache e compilação paralela
org.gradle.caching=true
org.gradle.parallel=true
